{% extends "layout.html" %}

{% block title %}
Notes
{% endblock %}

{% block content %}
<div class="notes-container">
  <div class="notes-window">
    <!-- Header -->
    <div class="header">
      <h1>◆ NOTES.SYS ◆</h1>
      <p id="system-date">SYSTEM ONLINE :: {{ date.strftime('%a %-d %b') }}</p>
    </div>

    <!-- Add Note Form -->
    <div class="notes-add-section">
      <div class="notes-form-container">
        <textarea id="note-input" placeholder="TYPE YOUR NOTE HERE..." class="note-input" rows="4"></textarea>
        <button id="add-note-button" class="add-note-button">
          + ADD NOTE
        </button>
      </div>
    </div>

    <!-- Notes Grid -->
    <div class="notes-grid-section">
      <div class="notes-grid" id="notes-grid"></div>

      <div class="notes-empty" id="notes-empty">
        <p>◆ NO NOTES FOUND ◆</p>
        <p class="notes-empty-hint">CREATE YOUR FIRST NOTE ABOVE</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<!-- From:  https://flask.palletsprojects.com/en/stable/tutorial/static/ -->
<script src="{{ url_for('static', filename='notes.js') }}"></script>
{% endblock %}

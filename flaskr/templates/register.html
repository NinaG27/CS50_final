{% extends "layout.html" %}

{% block title %}
Register page
{% endblock %}

{% block content %}
<form class="form-register" method="post">
    <h2>Register</h2>
    <p class="error" style="color: red;" hidden></p>
    <div>
        <label for="email">Email:</label>
        <input autocomplete="off" name="email" type="email" placeholder="email">

        <label for="password">Password:</label>
        <input autocomplete="off" name="password" type="password" placeholder="password">

        <label for="check">Confirm password:</label>
        <input autocomplete="off" name="confirm" type="password" placeholder="repeat password">
    </div>
    <button type="submit">Register</button>
</form>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', filename='register.js')}}"></script>
{% endblock %}
